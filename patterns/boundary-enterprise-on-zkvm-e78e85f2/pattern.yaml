short_description: This integration demonstrates deploying HashiCorp Boundary Enterprise on IBM z/KVM to enable secure, identity-based access management for mainframe workloads.
description: The integration addresses the challenge of providing secure, least-privilege access to critical workloads running on IBM Z mainframes by leveraging HashiCorp Boundary Enterprise on z/KVM. Boundary's controller and worker architecture is mapped to z/KVM virtual machines, enabling session brokering and policy enforcement for mainframe-hosted applications. The solution enforces strong authentication, session recording, and audit logging, while supporting network segmentation and firewall best practices. This pattern helps organizations modernize mainframe access controls, reduce operational risk, and improve compliance. Some advanced Boundary features may require further validation or configuration on z/KVM.
