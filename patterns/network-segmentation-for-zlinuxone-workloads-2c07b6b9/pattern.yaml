short_description: Automate and audit network segmentation for IBM Z and LinuxOne workloads using HashiCorp Consul, enabling service mesh and service discovery with HiperSockets integration.
description: This integration pattern solves the challenge of managing network segmentation for IBM Z and LinuxOne workloads, where manual changes are error-prone and hard to audit. By deploying HashiCorp Consul as a service mesh and service discovery platform, organizations can automate network policy enforcement and HiperSockets configuration. The solution enables version-controlled, auditable network state and robust service discovery for Z-based microservices. Secure communication and access controls are emphasized, with all network definitions managed as code. While some manual steps remain, this approach lays the foundation for scalable, automated mainframe networking.
