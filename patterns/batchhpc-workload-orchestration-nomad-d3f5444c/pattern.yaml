short_description: This integration pattern demonstrates how HashiCorp Nomad can orchestrate batch and HPC workloads on IBM z/OS and z/Linux, enabling migration from legacy JCL-based schedulers to modern, cloud-native workflows.
description: Legacy mainframe batch schedulers often lack support for modern orchestration and container-based workflows. This pattern leverages HashiCorp Nomad to schedule and manage batch and HPC jobs on IBM z/Linux, providing a scalable, cloud-native alternative to traditional JCL-based scheduling. By encapsulating JCL logic in containers or scripts and integrating with UNIX System Services, organizations can modernize their workload orchestration while maintaining mainframe reliability. Secure communication, job monitoring, and enterprise integration are emphasized. The solution addresses migration, flexibility, and operational efficiency for mainframe environments.
